server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets — long-lived immutable cache.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Photo references — immutable filenames; long cache is safe.
    location /references/ {
        access_log off;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # references.json — short cache so curated edits propagate quickly.
    location = /references.json {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # Fallback for the single-page entry document.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;
    gzip_min_length 1024;
}
